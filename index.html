<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pozvanie</title>
          <style>
    body {
      font-family: Arial, sans-serif;
      background: #d31b40;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgb(255, 255, 255);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #ff5c8a;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
    }

    button:hover {
      background: #e6376c;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
      color: #333;
    }
  </style>
    </head>
    <body>

<form id="inviteForm" action="https://formsubmit.co/sidorovmich34@gmail.com" method="POST">

<div class="card">
  <h1>Ahoj 🙂</h1>
  <p>Vyber si, kedy maš voľno</p>

  <label for="deň">Vyber si deň:</label>
  <select name="deň">
    <option>Pondelok 6.7.</option>
    <option>Utorok 7.7.</option>
    <option>Streda 8.7.</option>
    <option>Štvrtok 9.7.</option>
    <option>Piatok 10.7.</option>
    <option>Sobota 11.7.</option>
    <option>Nedeľa 12.7</option>
  </select>
  <label for="čas">Vyber si čas:</label>
  <select name="čas">
    <option>cca 18:00</option>
    <option>cca 19:00</option>
    <option>cca 16:00</option>
    <option>cca 14:00</option>
  </select>
  <label for="aktivita">Aktivita:</label>
  <select name="aktivita">
    <option>Reštika 🍝</option>
    <option>Azijska reštika🍜</option>
    <option>Čajovna/kaviaren</option>
    <option>Kino</option>
    <option>Čokolvel</option>
  </select>

   <button type="submit">Send 💌</button>

     <p id="successMessage" style="display:none; color: green;">
      Úspešne odoslané 🙂
    </p>

  </form>

  <script>
    document.getElementById("inviteForm").addEventListener("submit", function(event) {
      event.preventDefault();

      document.getElementById("successMessage").style.display = "block";

      setTimeout(() => {
        event.target.submit();
      }, 1000);
    });
  </script>

</body>
</html>
